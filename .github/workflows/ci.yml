name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      CODECOV_ENABLED: ${{ secrets.CODECOV_TOKEN != '' }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --locked --dev

    - name: Run linting with ruff
      run: |
        uv run ruff check .

    - name: Run type checking with mypy
      run: |
        uv run mypy src/pltr

    - name: Run tests with coverage
      run: |
        # Run all tests including integration tests (import issues fixed)
        uv run pytest tests/ --cov=pltr --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' && env.CODECOV_ENABLED == 'true'

    - name: Note Codecov upload skipped
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' && env.CODECOV_ENABLED == 'false'
      run: |
        printf '%s\n' '### Codecov upload skipped' 'CODECOV_TOKEN is unavailable; coverage was generated but not uploaded.' >> "$GITHUB_STEP_SUMMARY"

  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        uv sync --locked --dev

    - name: Check code formatting with ruff
      run: |
        uv run ruff format --check .

    - name: Audit locked runtime dependencies
      run: |
        uv export --locked --format requirements-txt --no-dev --no-hashes --no-emit-project --output-file "${RUNNER_TEMP}/runtime-requirements.txt"
        uv run pip-audit --disable-pip --no-deps --strict --format json --progress-spinner off --requirement "${RUNNER_TEMP}/runtime-requirements.txt"
